name: rlpg unit tests

on:
  push:
    paths:
      - "rlpg/**"
      - ".github/workflows/rlpg-tests.yml"
  pull_request:
    paths:
      - "rlpg/**"
      - ".github/workflows/rlpg-tests.yml"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        working-directory: rlpg

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies (numpy, pytest)
        run: pip install numpy pytest

      - name: Install optional dependencies (torch, matplotlib, tqdm)
        # These are optional; tests skip gracefully when absent.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu matplotlib tqdm || true

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: rlpg/tests/
