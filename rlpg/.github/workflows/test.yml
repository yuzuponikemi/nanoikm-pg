name: Tests

on:
  push:
    branches: [main]
    paths:
      - "rlpg/**"
  pull_request:
    branches: [main]
    paths:
      - "rlpg/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rlpg

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: rlpg/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
